# Rime schema
# encoding: utf-8

schema:
  schema_id: pinyin_ice_cangjie5
  name: 雾凇拼音·倉頡
  version: "2026-04-20"
  author:
    - Dvel
  description: |
    雾凇拼音 + 仓颉五代辅助码方案。
    支持 `;` / `,` 引导仓颉辅码筛选；单字取首尾码，词语取首尾字首码。
    支持 ` 引导完整仓颉反查。
  dependencies:
    - cangjie5

switches:
  - name: ascii_mode
    states: [中, 英]
  - name: full_shape
    states: [半角, 全角]
  - name: ascii_punct
    states: [。，, ．，]
  - name: traditionalization
    states: [简, 繁]

engine:
  processors:
    - ascii_composer
    - lua_processor@*aux_code_filter*processor
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - table_translator@custom_phrase
    - reverse_lookup_translator
  filters:
    - lua_filter@*aux_code_filter*filter
    - simplifier@traditionalize
    - uniquifier

aux_code_filter:
  dictionary: cangjie5
  separators: ";,"
  match_strategy: word_first_last
  max_code_length: 2
  show_prompt: true
  property_prefix: pinyin_ice_cangjie5_aux

translator:
  dictionary: pinyin_ice
  enable_word_completion: true
  initial_quality: 1.2
  preedit_format:
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1v/
    - xform/([nl])ue/$1ve/
    - xform/(?<=[A-Z])\s(?=[A-Z])//

custom_phrase:
  dictionary: ""
  user_dict: custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99

traditionalize:
  option_name: traditionalization
  opencc_config: s2t.json
  tips: none
  tags: [ abc ]

punctuator:
  import_preset: symbols

reverse_lookup:
  dictionary: cangjie5
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: "〔倉頡〕"

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]+[a-z]*|[a-z]+)$"
    reverse_lookup: "`[a-z]*'?$|[a-z]*'$"

key_binder:
  import_preset: default

editor:
  bindings:
    space: confirm
    Return: commit_raw_input
    Control+Return: commit_script_text
    Control+Shift+Return: commit_comment
    BackSpace: revert
    Delete: delete
    Control+BackSpace: back_syllable
    Control+Delete: delete_candidate
    Escape: cancel

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA`
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
  algebra:
    - erase/^hm$/
    - erase/^m$/
    - erase/^n$/
    - erase/^ng$/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/^([nl])ue$/$1ve/
    - derive/^([jqxy])v/$1u/
    - derive/([zcs])h(a|e|i|u|ai|ei|an|en|ou|uo|ua|un|ui|uan|uai|uang|ang|eng|ong)$/h$1$2/
    - derive/([zcs])h([aeiu])$/$1$2h/
    - derive/^([wghk])ai$/$1ia/
    - derive/([wfghkz])ei$/$1ie/
    - derive/([jqx])ie$/$1ei/
    - derive/([rtypsdghklzcbnm])ao$/$1oa/
    - derive/([ypfm])ou$/$1uo/
    - derive/([wrtypsdfghklzcbnm])ang$/$1nag/
    - derive/([wrtypsdfghklzcbnm])ang$/$1agn/
    - derive/([wrtpsdfghklzcbnm])eng$/$1neg/
    - derive/([wrtpsdfghklzcbnm])eng$/$1egn/
    - derive/([qtypdjlxbnm])ing$/$1nig/
    - derive/([qtypdjlxbnm])ing$/$1ign/
    - derive/([rtysdghklzcn])ong$/$1nog/
    - derive/([rtysdghklzcn])ong$/$1ogn/
    - derive/([qtpdjlxbnm])iao$/$1ioa/
    - derive/([qtpdjlxbnm])iao$/$1oia/
    - derive/([rtsghkzc])ui$/$1iu/
    - derive/([qjlxnm])iu$/$1ui/
    - derive/([qjlxn])iang$/$1aing/
    - derive/([qjlxn])iang$/$1inag/
    - derive/([g|k|h|zh|sh])ua$/$1au/
    - derive/([g|h|k|zh|ch|sh])uai$/$1aui/
    - derive/([qrtysdghjklzxcn])uan$/$1aun/
    - derive/([nlyjqx])ue$/$1eu/
    - derive/([g|h|k|zh|ch|sh])uang$/$1aung/
    - derive/([g|h|k|zh|ch|sh])uang$/$1uagn/
    - derive/([g|h|k|zh|ch|sh])uang$/$1unag/
    - derive/([g|h|k|zh|ch|sh])uang$/$1augn/
    - derive/([jqx])iong$/$1inog/
    - derive/([jqx])iong$/$1oing/
    - derive/([jqx])iong$/$1iogn/
    - derive/([jqx])iong$/$1oign/
    - derive/([rtsdghkzc])o(u|ng)$/$1o/
    - derive/(.+)ong$/$1on/
    - derive/([tl])eng$/$1en/
    - derive/([qwrtypsdfghjklzxcbnm])([aeio])ng$/$1ng/
