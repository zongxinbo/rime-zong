# Rime schema settings
# encoding: utf-8

schema:
  schema_id: lingcang
  name: 灵仓
  version: "2026.05.26"
  author:
    - zongxinbo <https://github.com/zongxinbo>
  description: |
    灵仓是基于仓颉五代字根的 A/B 互斥前缀码实验方案。
    A 区为主体字根码，B 区为 a/e/i/o/u 五个终止码，终止码暂定取末字根发音韵首。
    设计受灵明输入法前缀码结构启发，但不使用灵明拆分、宏和专用 Lua 过滤。
  dependencies:
    - pinyin_simp

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: extended_charset
    states: [ 常用, 增廣 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - options: [ noop, traditionalization, simplification ]
    reset: 0
    states: [ 默认汉字, 繁體漢字, 简体汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
  filters:
    - simplifier
    - simplifier@traditionalization
    - uniquifier
    - single_char_filter

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " ;"
  max_code_length: 4
  auto_select: true
  auto_select_pattern: "[bcdfghjklmnpqrstvwxyz]{4}|[bcdfghjklmnpqrstvwxyz]{1,3}[aeiou]"

translator:
  dictionary: lingcang
  enable_charset_filter: true
  encode_commit_history: false
  enable_encoder: false
  enable_completion: true
  enable_user_dict: false
  enable_sentence: false
  max_phrase_length: 1

abc_segmentor:
  extra_tags:
#    - reverse_lookup

reverse_lookup:
  dictionary: pinyin_simp
  prism: pinyin_simp
  prefix: "`"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

simplifier:
  tips: all

traditionalization:
  opencc_config: s2t.json
  option_name: traditionalization
  tips: all

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: semicolon, send: 2 }
    - { when: has_menu, accept: apostrophe, send: 3 }
    - { when: has_menu, accept: space, send: space }
    - { when: has_menu, accept: Tab, send: Escape }
    - { when: composing, accept: space, send: Escape }
    - { when: composing, accept: Tab, send: Escape }

ascii_composer:
  switch_key:
    Caps_Lock: clear
    Shift_L: commit_code
    Shift_R: commit_text

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    reverse_lookup: "`[a-z]*$"
