# Rime 方案配置
# 编码：UTF-8
# 自动生成，请勿手动修改。

schema:
  schema_id: zrm_single
  name: 自然码·仓颉·单字
  version: "2026-05-11"
  author:
    - rime-zong
  description: |
    自然码·仓颉·单字
    单字：一位辅助码末尾补 z；短码按分组首选和高频次选生成，异读不占短码。
    词语：不收词，不造词，只保留静态单字和仓颉兜底。
    仓颉：输入 o + 仓颉五代码，同字多码全部保留；必要时补 z 直达仓颉候选。
  dependencies:
    - pinyin_simp

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: extended_charset
    states: [ 常用, 增廣 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - options: [ noop, traditionalization, simplification ]
    reset: 0
    states: [ 默认汉字, 繁體漢字, 简体汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - table_translator
  filters:
    - simplifier
    - simplifier@traditionalization
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " ;"
  max_code_length: 6
  auto_select: false
  auto_select_unique_candidate: false

translator:
  dictionary: zrm_single
  enable_charset_filter: true
  encode_commit_history: false
  enable_encoder: false
  enable_completion: true
  enable_user_dict: false
  enable_sentence: false
  max_phrase_length: 1

abc_segmentor:
  extra_tags:

reverse_lookup:
  dictionary: pinyin_simp
  prism: pinyin_simp
  prefix: "`"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

simplifier:
  tips: all

traditionalization:
  opencc_config: s2t.json
  option_name: traditionalization
  tips: all

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: semicolon, send: 2 }
    - { when: has_menu, accept: apostrophe, send: 3 }
    - { when: has_menu, accept: space, send: space }
    - { when: has_menu, accept: Tab, send: Escape }
    - { when: composing, accept: space, send: Escape }
    - { when: composing, accept: Tab, send: Escape }

ascii_composer:
  switch_key:
    Caps_Lock: clear
    Shift_L: commit_code
    Shift_R: commit_text

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    reverse_lookup: "`[a-z]*$"
