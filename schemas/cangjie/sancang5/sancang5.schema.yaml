# Rime schema settings
# encoding: utf-8

schema:
  schema_id: sancang5
  name: 三码仓颉·五代
  version: '1.0'
  author:
    - zongxinbo <https://github.com/zongxinbo>
  description: |
    三码仓颉五代，由仓颉五代码表按三码规则取码生成。
    码表来源：仓颉五代补完计划 https://github.com/Jackchows/Cangjie5
    方案来源：三码仓颉 https://github.com/lotem/rime-sancang
    当前方案：https://github.com/zongxinbo/rime-zong
    仓颉输入法发明人：朱邦复先生。

    特点：
      一至三码保留原码；四码及以上取首码、次码、末码；
      默认过滤 z 开头的兼容汉字、部首、笔画及符号编码，并保留单字汉字；
      支持语句流（整句连打）；
      支持拼音反查、扩展字符和简繁转换。
    操作：
      空格：有候选时上屏，无匹配时清码；
      Tab：清码；
      回车：提交当前编码但不切英文；
      Caps Lock：清码并切到英文模式；
      左Shift：提交当前编码并切到英文模式；
      右Shift：提交当前文字并切到英文模式。
    反查：输入 ` 可拼音反查。
  dependencies:
    - pinyin_simp

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: extended_charset
    states: [ 常用, 增廣 ]
  - name: ascii_punct
    states: [ 。，, ．， ]
  - options: [ noop, traditionalization, simplification ]
    reset: 0
    states: [ 默认汉字, 繁體漢字, 简体汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - reverse_lookup_translator
  filters:
    - simplifier
    - simplifier@traditionalization
    - charset_filter@
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " ;'"

translator:
  dictionary: sancang5
  prism: sancang5
  preedit_format:
    - 'xform/(?<![^x])x/#/'
    - "xlit|abcdefghijklmnopqrstuvwxyz#|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜片重|"
  comment_format:
    - 'xform/(?<![^x])x/#/'
    - "xlit|abcdefghijklmnopqrstuvwxyz#~|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜片重～|"
  disable_user_dict_for_patterns:
    - "^z.*$"

reverse_lookup:
  dictionary: pinyin_simp
  prism: pinyin_simp
  prefix: "`"
  suffix: "'"
  tips: 〔拼音〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/
  comment_format:
    - 'xform/(?<![^x])x/#/'
    - "xlit|abcdefghijklmnopqrstuvwxyz#~|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜片重～|"

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: space, send: space }
    - { when: has_menu, accept: Tab, send: Escape }
    - { when: composing, accept: space, send: Escape }
    - { when: composing, accept: Tab, send: Escape }

simplifier:
  tips: all

traditionalization:
  opencc_config: s2t.json
  option_name: traditionalization
  tips: all

ascii_composer:
  switch_key:
    Caps_Lock: clear
    Shift_L: commit_code
    Shift_R: commit_text

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    reverse_lookup: "`[a-z]*'?$|[a-z]*'$"

__patch:
  # 使用八股文简化字模型
  - grammar:/hans?
  # 用家自选配置
  - sancang5.custom:/patch?
