# Rime schema
# vim: set sw=2 sts=2 et:
# encoding: utf-8
#
# ZMSJ - 世纪郑码
#
# QQ群：40737127

schema:
  schema_id: &schema zmsj
  name: 世纪郑码
  version: 1.0.0
  author:
    - 郑易里
    - 郑  珑
  description: |
    郑码输入法
    包含汉字基本集CJK、扩展集CJK-A~J全汉字、词组、西夏文等，编码兼顾大陆、港台字形
  dependencies:
    - &reverse pinyin_simp # 拼音反查采用袖珍简化字拼音（pinyin-simp）方案，可根据需要替换其他方案

switches:
  - name: ascii_mode
    states: [中文, 英文]
  - name: full_shape
    states: [半角, 全角]
  - name: ascii_punct
    states: ["。，", "．，"]
  - name: extended_charset
    states: [常用, 超集]
  - options: [nodiv, div, charset] # 显示拆分、字集
    states: [不拆, 拆分, 字集]
  - name: trad # 打简出繁
    states: [原始, 繁体]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - reverse_lookup_translator # 拼音反查
  filters:
    - simplifier # 打简出繁
    - simplifier@div # 拆分
    - simplifier@charset # 字集
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz?" # "?"作万能通配键
  max_code_length: 4 # 四码顶字上屏
#  auto_select: true # 无重自动上屛
  algebra: # 万能通配键设置
#    - derive/^./?/ # 首码不使用万能通配键，否则影响"？"的输入
    - derive/^(.)./$1?/
    - derive/^(..)./$1?/
#    - derive/^(...)./$1?/ # 第四码以“编码逐键提示”形式展示

translator:
  dictionary: *schema
  enable_charset_filter: true # 字集过滤
  enable_sentence: true # 自动造句
  enable_encoder: true # 自动造词
  encode_commit_history: true # 对已上屏自动成词
  max_phrase_length: 5 # 自动成词词长
  enable_user_dict: false # 关闭用户词典和字频调整
  enable_completion: true # 编码逐键提示

reverse_lookup: # 拼音反查
  dictionary: *reverse
  prefix: "`" # 前缀
  suffix: "'" # 后缀
  tips: 〔拼音反查〕

simplifier: # 打简出繁
  option_name: trad
  opencc_config: s2t.json # 简体转繁体，可根据需要替换s2hk.json、s2tw.json、s2twp.json等
  tips: all # 提示转换之前的字

div: # 拆分
  option_name: div
  opencc_config: zmsj_div.json
  tips: char # 仅单字
  show_in_comment: true
  comment_format:
    - xform/,/ /
    - xform/^/【/
    - xform/$/】/

charset: # 字集
  option_name: charset
  opencc_config: ucs.json
  tips: char # 仅单字
  show_in_comment: true
  comment_format:
    - xform/^/【/
    - xform/$/】/

punctuator:
#  import_preset: default
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - {when: has_menu, accept: comma, send: comma} # 恢复逗号顶字
    - {when: has_menu, accept: period, send: period} # 恢复句号顶字
    - {when: has_menu, accept: semicolon, send: 2} # 分号次选
    - {when: has_menu, accept: apostrophe, send: 3} # 引号三选
    - {when: always, accept: Shift+space, toggle: full_shape} # 全角
    - {when: always, accept: Control+period, toggle: ascii_punct} # 标点
    - {when: always, accept: Control+Shift+C, toggle: div} # 拆分、字集
    - {when: always, accept: Control+Shift+F, toggle: trad} # 打简出繁

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[A-Za-z]+)$"
    reverse_lookup: "`[a-z]*'?" # 拼音反查
